_min_copier_version: "9.0.0"
_subdirectory: template
_answers_file: .copier-answers.core.yml
_templates_suffix: .jinja
_tasks:
  - >-
    if [ "{{ 1 if not with_pyinstaller else 0 }}" = "1" ]; then
      rm -rf "{{ package_name }}/entry" "{{ package_name }}/__main__.py" "test/entry" "requirements-build.txt" "tools/generate_spec.py";
    fi
  - >-
    if [ "{{ 1 if not with_pyinstaller else 0 }}" = "1" ]; then
      find "docs/source/_shims" -mindepth 1 ! -name '.keep' -delete;
    fi
  - >-
    if [ "{{ 1 if not with_loc_badge else 0 }}" = "1" ]; then
      rm -f ".github/workflows/badge.yml";
    fi
  - rm -f "CLAUDE.md" && ln -s "AGENTS.md" "CLAUDE.md"

project_name:
  type: str
  help: Human-readable project title.

repo_name:
  type: str
  help: Repository name used on GitHub.
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"

dist_name:
  type: str
  help: Distribution name used by setuptools / PyPI.
  default: "{{ repo_name }}"

package_name:
  type: str
  help: Import package name.
  default: "{{ repo_name | replace('-', '_') }}"

project_summary:
  type: str
  help: One-sentence project summary.

author_name:
  type: str
  help: Primary author display name.
  default: "HansBug"

author_email:
  type: str
  help: Primary author email.
  default: "hansbug@buaa.edu.cn"

github_owner:
  type: str
  help: GitHub owner or organization.
  default: "HansBug"

license_name:
  type: str
  help: SPDX-like license selector.
  default: "Apache-2.0"
  choices:
    - "Apache-2.0"
    - "MIT"
    - "BSD-2-Clause"
    - "BSD-3-Clause"
    - "GPL-3.0-only"
    - "LGPL-3.0-only"
    - "MPL-2.0"

initial_version:
  type: str
  help: Initial package version.
  default: "0.1.0"

python_min:
  type: str
  help: Minimum supported Python version.
  default: "3.8"
  choices:
    - "3.7"
    - "3.8"
    - "3.9"
    - "3.10"
    - "3.11"
    - "3.12"
    - "3.13"
    - "3.14"

python_max:
  type: str
  help: Maximum supported Python version.
  default: "3.14"
  validator: >-
    {% if python_max.split('.')[0] != python_min.split('.')[0] or (python_max.split('.')[1] | int) < (python_min.split('.')[1] | int) %}
    python_max must be in the same major version line and not lower than python_min.
    {% endif %}
  choices:
    - "3.7"
    - "3.8"
    - "3.9"
    - "3.10"
    - "3.11"
    - "3.12"
    - "3.13"
    - "3.14"

project_keywords:
  type: str
  help: Comma-separated package keywords.
  default: "python, utilities"

with_pyinstaller:
  type: bool
  help: Generate PyInstaller build support and CLI entrypoint scaffolding.
  default: false

cli_command:
  type: str
  help: Console command name.
  default: "{{ repo_name }}"
  when: "{{ with_pyinstaller }}"

with_loc_badge:
  type: bool
  help: Enable gist-backed LOC badge automation and README badge rendering.
  default: false

badge_gist_owner:
  type: str
  help: GitHub owner of the public gist used for dynamic badge JSON.
  default: "{{ github_owner }}"
  when: "{{ with_loc_badge }}"

badge_gist_id:
  type: str
  help: Public gist ID used to host the LOC badge JSON payload.
  when: "{{ with_loc_badge }}"

project_identity:
  type: str
  help: Short AI guide identity paragraph.
  default: "{{ project_name }} is a Python project maintained in the HansBug-style workflow."

project_scope:
  type: str
  help: Short AI guide scope paragraph.
  default: "Keep the repository pragmatic, cross-platform, and packaging-friendly."

project_constraints:
  type: str
  help: Short AI guide constraints paragraph.
  default: "Preserve quick local bootstrap, standard setuptools packaging, and reproducible docs/test flows."
